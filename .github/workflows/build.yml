name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Publish Test Summary
        if: always()
        run: |
          echo "## Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "target/surefire-reports" ]; then
            total=0
            passed=0
            failed=0
            errors=0
            for file in target/surefire-reports/TEST-*.xml; do
              if [ -f "$file" ]; then
                t=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1)
                f=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1)
                e=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1)
                total=$((total + t))
                failed=$((failed + f))
                errors=$((errors + e))
              fi
            done
            passed=$((total - failed - errors))
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| :white_check_mark: Passed | $passed |" >> $GITHUB_STEP_SUMMARY
            echo "| :x: Failed | $failed |" >> $GITHUB_STEP_SUMMARY
            echo "| :warning: Errors | $errors |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$total** |" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: No test reports found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 14

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar

      - name: Verify JAR exists
        run: ls -la *.jar

      - name: Start application
        run: |
          nohup java -jar demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start. Logs:"
              cat app.log
              exit 1
            fi
            sleep 2
          done

      - name: Run Karate tests
        run: mvn test-compile test -Pkarate -Dkarate.base.url=http://localhost:8080 -B

      - name: Publish Karate Test Summary
        if: always()
        run: |
          echo "## Karate Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Find karate reports in either location
          KARATE_DIR=""
          if [ -d "target/karate-reports" ]; then
            KARATE_DIR="target/karate-reports"
          fi

          if [ -n "$KARATE_DIR" ]; then
            echo "Karate HTML report generated — download the **karate-reports** artifact to view." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Parse karate-summary.json if available
            SUMMARY_JSON="$KARATE_DIR/karate-summary-json.txt"
            if [ -f "$SUMMARY_JSON" ]; then
              features=$(grep -oP '"featuresPassed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              featuresFailed=$(grep -oP '"featuresFailed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              scenarios=$(grep -oP '"scenariosPassed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              scenariosFailed=$(grep -oP '"scenariosFailed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              echo "### Features" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| :white_check_mark: Passed | $features |" >> $GITHUB_STEP_SUMMARY
              echo "| :x: Failed | $featuresFailed |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Scenarios" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| :white_check_mark: Passed | $scenarios |" >> $GITHUB_STEP_SUMMARY
              echo "| :x: Failed | $scenariosFailed |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Fallback to surefire reports
          if [ -d "target/surefire-reports" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### JUnit Summary" >> $GITHUB_STEP_SUMMARY
            total=0; passed=0; failed=0; errors=0
            for file in target/surefire-reports/TEST-*.xml; do
              if [ -f "$file" ]; then
                t=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1)
                f=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1)
                e=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1)
                total=$((total + t)); failed=$((failed + f)); errors=$((errors + e))
              fi
            done
            passed=$((total - failed - errors))
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| :white_check_mark: Passed | $passed |" >> $GITHUB_STEP_SUMMARY
            echo "| :x: Failed | $failed |" >> $GITHUB_STEP_SUMMARY
            echo "| :warning: Errors | $errors |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$total** |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Karate reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: karate-reports
          path: |
            target/karate-reports/
            target/surefire-reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        run: kill $(lsof -t -i:8080) 2>/dev/null || true
