name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Publish Test Summary
        if: always()
        run: |
          echo "## Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "target/surefire-reports" ]; then
            total=0
            passed=0
            failed=0
            errors=0
            for file in target/surefire-reports/TEST-*.xml; do
              if [ -f "$file" ]; then
                t=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1)
                f=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1)
                e=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1)
                total=$((total + t))
                failed=$((failed + f))
                errors=$((errors + e))
              fi
            done
            passed=$((total - failed - errors))
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| :white_check_mark: Passed | $passed |" >> $GITHUB_STEP_SUMMARY
            echo "| :x: Failed | $failed |" >> $GITHUB_STEP_SUMMARY
            echo "| :warning: Errors | $errors |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$total** |" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: No test reports found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 14

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar

      - name: Verify JAR exists
        run: ls -la *.jar

      - name: Start application
        run: |
          nohup java -jar demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start. Logs:"
              cat app.log
              exit 1
            fi
            sleep 2
          done

      - name: Run Karate tests
        run: mvn test-compile test -Pkarate -Dkarate.base.url=http://localhost:8080 -B

      - name: Publish Karate Test Summary
        if: always()
        run: |
          python3 << 'EOF'
          import json, glob, os

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          with open(summary_file, "a") as out:
              out.write("## Karate Test Results :rocket:\n\n")

              karate_dir = "target/karate-reports"
              if not os.path.isdir(karate_dir):
                  out.write(":warning: No Karate reports found.\n")
                  exit(0)

              # Overview from summary JSON
              summary_json = os.path.join(karate_dir, "karate-summary-json.txt")
              if os.path.isfile(summary_json):
                  with open(summary_json) as f:
                      data = json.load(f)
                  fp = data.get("featuresPassed", 0)
                  ff = data.get("featuresFailed", 0)
                  sp = data.get("scenariosPassed", 0)
                  sf = data.get("scenariosFailed", 0)
                  elapsed = data.get("elapsedTime", 0) / 1000

                  out.write("### Overview\n")
                  out.write("| Metric | Passed | Failed |\n")
                  out.write("|--------|--------|--------|\n")
                  out.write(f"| Features | :white_check_mark: {fp} | :x: {ff} |\n")
                  out.write(f"| Scenarios | :white_check_mark: {sp} | :x: {sf} |\n\n")
                  out.write(f"> Elapsed: {elapsed:.2f}s\n\n")

              # Feature details from individual JSON files
              out.write("### Feature Details\n\n")
              for json_file in sorted(glob.glob(os.path.join(karate_dir, "*.karate-json.txt"))):
                  with open(json_file) as f:
                      feature = json.load(f)

                  name = feature.get("name", os.path.basename(json_file))
                  scenarios = feature.get("scenarioResults", [])
                  passed = sum(1 for s in scenarios if not s.get("failed", False))
                  failed = sum(1 for s in scenarios if s.get("failed", False))
                  icon = ":white_check_mark:" if failed == 0 else ":x:"

                  out.write(f"<details>\n<summary>{icon} <strong>{name}</strong> ({passed} passed, {failed} failed)</summary>\n\n")
                  out.write("| Scenario | Status | Duration |\n")
                  out.write("|----------|--------|----------|\n")

                  for sc in scenarios:
                      sc_name = sc.get("name", "unknown")
                      sc_failed = sc.get("failed", False)
                      sc_duration = sc.get("durationMillis", 0) / 1000
                      status = ":x: FAIL" if sc_failed else ":white_check_mark: PASS"
                      out.write(f"| {sc_name} | {status} | {sc_duration:.2f}s |\n")

                      # Show error message for failed scenarios
                      if sc_failed:
                          error_msg = sc.get("failureMessage", "")
                          if error_msg:
                              out.write(f"\n> :x: **Error:** `{error_msg[:200]}`\n\n")

                  out.write("\n</details>\n\n")
          EOF

      - name: Stop application
        if: always()
        run: kill $(lsof -t -i:8080) 2>/dev/null || true
