name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Publish Test Summary
        if: always()
        run: |
          echo "## Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "target/surefire-reports" ]; then
            total=0
            passed=0
            failed=0
            errors=0
            for file in target/surefire-reports/TEST-*.xml; do
              if [ -f "$file" ]; then
                t=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1)
                f=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1)
                e=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1)
                total=$((total + t))
                failed=$((failed + f))
                errors=$((errors + e))
              fi
            done
            passed=$((total - failed - errors))
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| :white_check_mark: Passed | $passed |" >> $GITHUB_STEP_SUMMARY
            echo "| :x: Failed | $failed |" >> $GITHUB_STEP_SUMMARY
            echo "| :warning: Errors | $errors |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$total** |" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: No test reports found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 14

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar

      - name: Verify JAR exists
        run: ls -la *.jar

      - name: Start application
        run: |
          nohup java -jar demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start. Logs:"
              cat app.log
              exit 1
            fi
            sleep 2
          done

      - name: Run Karate tests
        run: mvn test-compile test -Pkarate -Dkarate.base.url=http://localhost:8080 -B

      - name: Publish Karate Test Summary
        if: always()
        run: |
          echo "## Karate Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          KARATE_DIR="target/karate-reports"

          if [ -d "$KARATE_DIR" ]; then
            # Parse karate-summary-json.txt for overview
            SUMMARY_JSON="$KARATE_DIR/karate-summary-json.txt"
            if [ -f "$SUMMARY_JSON" ]; then
              features=$(grep -oP '"featuresPassed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              featuresFailed=$(grep -oP '"featuresFailed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              scenarios=$(grep -oP '"scenariosPassed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              scenariosFailed=$(grep -oP '"scenariosFailed"\s*:\s*\K[0-9]+' "$SUMMARY_JSON" || echo "0")
              elapsed=$(grep -oP '"elapsedTime"\s*:\s*\K[0-9.]+' "$SUMMARY_JSON" || echo "0")
              elapsed_sec=$(awk "BEGIN {printf \"%.2f\", $elapsed/1000}")

              echo "### Overview" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Passed | Failed |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
              echo "| Features | :white_check_mark: $features | :x: $featuresFailed |" >> $GITHUB_STEP_SUMMARY
              echo "| Scenarios | :white_check_mark: $scenarios | :x: $scenariosFailed |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> Elapsed: ${elapsed_sec}s" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Inline each feature result
            echo "### Feature Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for json_file in "$KARATE_DIR"/*.karate-json.txt; do
              if [ -f "$json_file" ]; then
                feature_name=$(grep -oP '"name"\s*:\s*"\K[^"]+' "$json_file" | head -1)
                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary><strong>$feature_name</strong></summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| Scenario | Status | Duration |" >> $GITHUB_STEP_SUMMARY
                echo "|----------|--------|----------|" >> $GITHUB_STEP_SUMMARY

                # Parse each scenario from the feature JSON
                grep -oP '"scenarioResults"\s*:\s*\[\K[^\]]+' "$json_file" | tr '}' '\n' | while read -r line; do
                  sc_name=$(echo "$line" | grep -oP '"name"\s*:\s*"\K[^"]+' || true)
                  sc_failed=$(echo "$line" | grep -oP '"failed"\s*:\s*\K\w+' || true)
                  sc_duration=$(echo "$line" | grep -oP '"durationMillis"\s*:\s*\K[0-9.]+' || true)
                  if [ -n "$sc_name" ]; then
                    if [ "$sc_failed" = "true" ]; then
                      status=":x: FAIL"
                    else
                      status=":white_check_mark: PASS"
                    fi
                    duration_sec=$(awk "BEGIN {printf \"%.2f\", ${sc_duration:-0}/1000}")
                    echo "| $sc_name | $status | ${duration_sec}s |" >> $GITHUB_STEP_SUMMARY
                  fi
                done

                echo "" >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo ":warning: No Karate reports found in target/karate-reports/" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Stop application
        if: always()
        run: kill $(lsof -t -i:8080) 2>/dev/null || true
